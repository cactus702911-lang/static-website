<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post | RealShopUSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 flex flex-col min-h-screen">
    
    <!-- Header injected via js/components.js -->

    <main class="flex-grow pt-20 pb-24" id="main-content">
        <div class="container mx-auto px-4 md:px-6">
            <div id="blog-detail-view">
                <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
                    <a 
                        href="blog.html"
                        class="m-6 mb-2 text-blue-600 hover:text-blue-800 flex items-center gap-2 font-medium"
                    >
                        ← Back to all articles
                    </a>
                    
                    <div id="post-header-image" class="h-64 md:h-96 w-full relative">
                        <img id="detail-image" src="" alt="" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                        <div class="absolute bottom-6 left-6 right-6 text-white">
                            <span id="detail-category-badge" class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-3 inline-block"></span>
                            <h1 id="detail-title" class="text-3xl md:text-4xl font-bold leading-tight"></h1>
                        </div>
                    </div>
                    
                    <div class="p-8 md:p-12">
                        <div class="flex items-center gap-6 text-sm text-slate-500 mb-8 border-b border-slate-100 pb-8">
                            <div class="flex items-center gap-2">
                                <span>📅</span>
                                <span id="detail-date"></span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span>👤</span>
                                <span id="detail-author"></span>
                            </div>
                        </div>

                        <div id="detail-content" class="prose prose-lg max-w-none text-slate-700">
                            <!-- Content loaded via JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer injected via js/components.js -->

    <script src="js/store.js"></script>
    <script src="js/components.js"></script>
    <script src="js/seo.js"></script>
    <script>
        function renderPage() {
            const content = siteContent;
            const blog = content.blog;

            // Handle ID or Slug
            const urlParams = new URLSearchParams(window.location.search);
            let postId = parseInt(urlParams.get('id'));
            let slug = urlParams.get('slug');
            
            let currentPost = null;
            if (slug) {
                // Find by slug or title match (for backward compatibility)
                currentPost = blog.posts.find(p => (p.slug === slug) || (p.title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') === slug));
            } else if (postId) {
                currentPost = blog.posts.find(p => p.id === postId);
            }

            if (!currentPost) {
                document.getElementById('main-content').innerHTML = '<div class="container mx-auto px-4 py-20 text-center text-xl text-red-400">Post not found</div>';
                return;
            }

            // SEO & Meta
            SEO.updateMeta({
                title: `${currentPost.title} | RealShopUSA Blog`,
                description: currentPost.excerpt,
                image: currentPost.image,
                keywords: `${currentPost.category}, blog, news`
            });

            // Render Content
            const detailImage = document.getElementById('detail-image');
            const headerImageContainer = document.getElementById('post-header-image');
            
            if (currentPost.image) {
                detailImage.src = currentPost.image;
                headerImageContainer.classList.remove('hidden');
            } else {
                headerImageContainer.classList.add('hidden');
            }
            
            document.getElementById('detail-category-badge').textContent = currentPost.category;
            document.getElementById('detail-title').textContent = currentPost.title;
            document.getElementById('detail-date').textContent = currentPost.date;
            document.getElementById('detail-author').textContent = currentPost.author;
            
            const contentDiv = document.getElementById('detail-content');
            contentDiv.innerHTML = currentPost.content.split('\n').map(p => `<p class="mb-4 leading-relaxed">${p}</p>`).join('');
        }

        document.addEventListener('DOMContentLoaded', renderPage);
        window.addEventListener('contentUpdated', renderPage);
    </script>
</body>
</html>
