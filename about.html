<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | RealShopUSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 flex flex-col min-h-screen">
    
    <!-- Header injected via js/components.js -->

    <main class="flex-grow pt-20">
      <!-- Hero -->
      <section class="bg-slate-50 py-20">
        <div class="container mx-auto px-4 md:px-6">
          <div class="flex flex-col md:flex-row items-center gap-12">
            <div class="md:w-1/2">
              <img 
                id="about-image"
                src="" 
                alt="About Us" 
                class="rounded-2xl shadow-2xl w-full max-w-md mx-auto"
              />
            </div>
            <div class="md:w-1/2">
              <h1 class="text-4xl md:text-5xl font-bold mb-6 text-slate-900">About <span class="text-blue-600" id="about-name"></span></h1>
              <p class="text-xl text-slate-600 mb-6 leading-relaxed" id="about-desc1">
              </p>
              <p class="text-slate-600 mb-8 leading-relaxed" id="about-desc2">
              </p>
              <div class="flex gap-4">
                <a href="#why-us" class="text-blue-600 font-bold hover:underline">Why Choose Us</a>
                <span class="text-slate-300">|</span>
                <a href="contact.html" class="text-blue-600 font-bold hover:underline">Get in Touch</a>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Stats -->
      <section class="py-16 border-y border-slate-100">
        <div class="container mx-auto px-4 md:px-6">
          <div class="grid grid-cols-2 md:grid-cols-4 gap-8 text-center" id="about-stats">
              <!-- Stats loaded via JS -->
          </div>
        </div>
      </section>

      <!-- Why We Are Best -->
      <section id="why-us" class="py-20">
        <div class="container mx-auto px-4 md:px-6 max-w-5xl">
          <div class="text-center mb-16">
             <h2 class="text-3xl font-bold mb-4 text-slate-900" id="exp-title">Why We Are The Best</h2>
             <p class="text-slate-600 max-w-2xl mx-auto">We provide premium quality accounts with a focus on security, speed, and customer satisfaction.</p>
          </div>
          
          <div class="grid md:grid-cols-2 gap-8" id="exp-grid">
            <!-- Experience loaded via JS -->
          </div>
        </div>
      </section>
      
      <!-- CTA -->
      <section class="py-20 bg-blue-600 text-white text-center">
        <div class="container mx-auto px-4">
          <h2 class="text-3xl font-bold mb-6" id="cta-title"></h2>
          <p class="text-blue-100 text-lg max-w-2xl mx-auto mb-10" id="cta-subtitle">
          </p>
          <a href="contact.html" class="inline-block bg-white text-blue-600 px-8 py-3 rounded-full font-bold hover:bg-slate-100 transition-colors" id="cta-button">
          </a>
        </div>
      </section>
    </main>

    <!-- Footer injected via js/components.js -->

    <script src="js/store.js"></script>
    <script src="js/components.js"></script>
    <script>
        function renderPage() {
            const content = siteContent;
            const about = content.about;

            // About Content
            document.getElementById('about-name').textContent = about.name;
            document.getElementById('about-desc1').textContent = about.description1;
            document.getElementById('about-desc2').textContent = about.description2;
            document.getElementById('about-image').src = about.image;
            
            document.getElementById('exp-title').textContent = about.experienceTitle;
            
            document.getElementById('cta-title').textContent = about.ctaTitle;
            document.getElementById('cta-subtitle').textContent = about.ctaSubtitle;
            document.getElementById('cta-button').textContent = about.ctaButton;

            // Stats
            const statsContainer = document.getElementById('about-stats');
            statsContainer.innerHTML = '';
            
            const statIcons = [
                `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-6 w-6 text-blue-600"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>`,
                `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-6 w-6 text-blue-600"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg>`,
                `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-6 w-6 text-blue-600"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/><path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>`,
                `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-6 w-6 text-blue-600"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>`
            ];

            about.stats.forEach((stat, index) => {
                const div = document.createElement('div');
                div.className = "p-4";
                div.innerHTML = `
                  <div class="bg-blue-50 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4">
                    ${statIcons[index] || statIcons[0]}
                  </div>
                  <h3 class="font-bold text-slate-900 text-lg">${stat.value}</h3>
                  <p class="text-sm text-slate-500 uppercase tracking-wide font-medium">${stat.label}</p>
                `;
                statsContainer.appendChild(div);
            });

            // Experience
            const expGrid = document.getElementById('exp-grid');
            expGrid.innerHTML = '';
            
            const expIcons = [
                `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>`,
                `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
                `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>`
            ];

            about.experience.forEach((exp, index) => {
                const div = document.createElement('div');
                div.className = "flex gap-4 bg-white p-6 rounded-xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow";
                div.innerHTML = `
                <div class="flex-shrink-0">
                   <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
                      ${expIcons[index] || expIcons[0]}
                   </div>
                </div>
                <div>
                  <h3 class="text-xl font-bold text-slate-900 mb-2">${exp.role}</h3>
                  <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-full mb-3 inline-block">${exp.period}</span>
                  <p class="text-slate-600 leading-relaxed text-sm">${exp.description}</p>
                </div>
                `;
                expGrid.appendChild(div);
            });
        }

        document.addEventListener('DOMContentLoaded', renderPage);
        window.addEventListener('contentUpdated', renderPage);
    </script>
</body>
</html>
