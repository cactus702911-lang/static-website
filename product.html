<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | RealShopUSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 flex flex-col min-h-screen">
    
    <!-- Header injected via js/components.js -->

    <main class="flex-grow pt-20 pb-20" id="main-content">
        <div class="container mx-auto px-4 md:px-6 py-8">
            <a href="shop.html" class="inline-flex items-center gap-2 text-slate-600 hover:text-blue-600 mb-8 font-medium transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> Back to Products
            </a>

            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 mb-16">
                <div class="grid lg:grid-cols-2 gap-0">
                    <!-- Image Gallery Side -->
                    <div class="bg-slate-900 relative group h-[300px] md:h-[400px] lg:h-auto min-h-[300px] flex items-center justify-center p-4 md:p-8">
                        <div class="absolute top-4 left-4 z-20 bg-black/50 backdrop-blur-md text-white text-xs px-2 py-1 rounded border border-white/20">
                            Screenshots / Proof
                        </div>
                        
                        <div id="gallery-container" class="relative w-full h-full flex items-center justify-center">
                            <img id="main-image" src="" alt="Product Image" class="w-full h-full object-contain max-h-[600px] shadow-2xl rounded-lg">
                            
                            <button id="prev-btn" onclick="prevImage()" class="hidden absolute left-4 top-1/2 -translate-y-1/2 bg-white/10 hover:bg-white/30 text-white p-2 md:p-3 rounded-full backdrop-blur-md transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                            </button>
                            <button id="next-btn" onclick="nextImage()" class="hidden absolute right-4 top-1/2 -translate-y-1/2 bg-white/10 hover:bg-white/30 text-white p-2 md:p-3 rounded-full backdrop-blur-md transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                            </button>
                            
                            <div id="gallery-dots" class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2">
                                <!-- Dots injected via JS -->
                            </div>
                        </div>
                    </div>

                    <!-- Content Side -->
                    <div class="p-6 md:p-8 lg:p-12 flex flex-col justify-center">
                        <div class="mb-6">
                            <span id="product-category" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider inline-block mb-4"></span>
                            <h1 id="product-title" class="text-2xl md:text-3xl lg:text-4xl font-bold text-slate-900 mb-4"></h1>
                            <div class="flex flex-wrap items-center gap-4 text-sm text-slate-500 font-medium">
                                <span class="flex items-center gap-1"><svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-green-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Verified</span>
                                <span class="flex items-center gap-1"><svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-yellow-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Instant Delivery</span>
                                <span class="flex items-center gap-1 text-yellow-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 fill-current" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> 
                                    <span class="text-slate-700 ml-1" id="review-stats">4.9 (120+ Reviews)</span>
                                </span>
                            </div>
                        </div>
                        
                        <div id="product-desc" class="prose prose-slate prose-lg mb-8 text-slate-600 leading-relaxed text-sm md:text-base"></div>

                        <!-- Product Specs -->
                        <div id="specs-container" class="bg-slate-50 rounded-2xl p-4 md:p-6 mb-8 border border-slate-100 hidden">
                            <h3 class="font-bold text-slate-900 mb-4 flex items-center gap-2 text-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Specifications
                            </h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-y-4 sm:gap-y-6 gap-x-8" id="product-specs">
                                <!-- Specs loaded via JS -->
                            </div>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-4 mt-auto">
                            <a href="contact.html" class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg hover:shadow-blue-500/25 text-center flex items-center justify-center gap-2">
                                Buy Now
                            </a>
                            <a href="contact.html" class="flex-1 bg-white text-slate-700 border border-slate-200 py-4 rounded-xl font-bold hover:bg-slate-50 transition-colors text-center flex items-center justify-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/><path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg> Contact Support
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabs Section (FAQ & Reviews) -->
            <div class="grid md:grid-cols-3 gap-8 mb-16">
                <div class="md:col-span-2">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="flex border-b border-slate-100">
                            <button onclick="switchTab('details')" id="tab-details" class="flex-1 py-4 font-bold text-sm uppercase tracking-wider bg-blue-50 text-blue-600 border-b-2 border-blue-600">Description</button>
                            <button onclick="switchTab('reviews')" id="tab-reviews" class="flex-1 py-4 font-bold text-sm uppercase tracking-wider text-slate-500 hover:bg-slate-50">Reviews</button>
                            <button onclick="switchTab('faq')" id="tab-faq" class="flex-1 py-4 font-bold text-sm uppercase tracking-wider text-slate-500 hover:bg-slate-50">FAQ</button>
                        </div>
                        
                        <div class="p-8">
                            <div id="content-details">
                                <div class="prose prose-slate max-w-none">
                                    <h3 class="text-xl font-bold mb-4">About this service</h3>
                                    <p id="details-desc"></p>
                                    <div class="mt-4 whitespace-pre-wrap" id="details-general"></div>
                                </div>
                            </div>

                            <div id="content-reviews" class="hidden space-y-6">
                                <!-- Reviews loaded via JS -->
                            </div>

                            <div id="content-faq" class="hidden space-y-4">
                                <!-- FAQ loaded via JS -->
                            </div>
                        </div>
                    </div>
                </div>

                <div class="md:col-span-1">
                    <div class="bg-blue-600 text-white rounded-2xl p-6 shadow-lg mb-6">
                        <h3 class="text-xl font-bold mb-4" id="sidebar-title">Purchase Guarantee</h3>
                        <ul class="space-y-4" id="sidebar-points">
                            <!-- Points loaded via JS -->
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Related Products -->
            <div id="related-products-container" class="mt-16 hidden">
                <h2 class="text-2xl font-bold text-slate-900 mb-8">Related Products</h2>
                <div class="grid md:grid-cols-3 gap-8" id="related-products-grid">
                    <!-- Related loaded via JS -->
                </div>
            </div>

        </div>
    </main>

    <!-- Footer injected via js/components.js -->

    <script src="/js/store.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/seo.js"></script>
    <script>
        let currentProduct = null;
        let galleryImages = [];
        let currentImageIdx = 0;

        function renderPage() {
            const content = siteContent;
            
            // Handle ID or Slug
            const urlParams = new URLSearchParams(window.location.search);
            let productId = parseInt(urlParams.get('id'));
            
            // Check for slug path: /product/slug-name
            const pathParts = window.location.pathname.split('/');
            const slug = pathParts.length > 2 && pathParts[1] === 'product' ? pathParts[2] : null;

            if (slug) {
                currentProduct = content.caseStudies.studies.find(p => p.slug === slug);
            } else if (productId) {
                currentProduct = content.caseStudies.studies.find(p => p.id === productId);
            }
            
            if (!currentProduct) {
                document.getElementById('main-content').innerHTML = '<div class="container mx-auto px-4 py-20 text-center text-xl text-red-400">Product not found</div>';
                return;
            }

            // SEO & Meta
            SEO.updateMeta({
                title: `${currentProduct.title} | RealShopUSA`,
                description: currentProduct.description,
                image: currentProduct.image,
                keywords: `${currentProduct.category}, buy ${currentProduct.title}, verified accounts`
            });
            SEO.injectSchema(SEO.generateProductSchema(currentProduct));
            
            // Gallery
            galleryImages = [currentProduct.image, ...(currentProduct.gallery || [])].filter(Boolean);
            updateGallery();

            // Info
            document.getElementById('product-category').textContent = currentProduct.category;
            document.getElementById('product-title').textContent = currentProduct.title;
            // Use shortDescription if available, else fallback to description
            document.getElementById('product-desc').textContent = currentProduct.shortDescription || currentProduct.description;

            // Review Count
            const reviewCount = currentProduct.reviews ? currentProduct.reviews.length : 0;
            const avgRating = reviewCount > 0 
                ? (currentProduct.reviews.reduce((acc, r) => acc + r.rating, 0) / reviewCount).toFixed(1) 
                : "5.0";
            document.getElementById('review-stats').textContent = `${avgRating} (${reviewCount} Reviews)`;

            // Specs
            if (currentProduct.specs) {
                const specsContainer = document.getElementById('product-specs');
                document.getElementById('specs-container').classList.remove('hidden');
                specsContainer.innerHTML = '';
                
                const specLabels = { age: "Account Age", ip: "IP Country", format: "Format", warranty: "Warranty" };
                Object.entries(currentProduct.specs).forEach(([key, value]) => {
                    const div = document.createElement('div');
                    const label = specLabels[key] || key;
                    const valueClass = key === 'warranty' ? 'text-green-600 font-bold' : (key === 'format' ? 'font-mono text-sm bg-white px-2 py-1 rounded border border-slate-200 inline-block text-slate-700' : 'text-slate-900 font-semibold');
                    
                    div.innerHTML = `
                        <p class="text-xs text-slate-500 uppercase tracking-wider font-bold mb-1">${label}</p>
                        <p class="${valueClass}">${value}</p>
                    `;
                    specsContainer.appendChild(div);
                });
            }

            // Tabs Content
            document.getElementById('details-desc').textContent = currentProduct.description;
            document.getElementById('details-general').textContent = content.productPage.generalDescription;

            // Reviews
            const reviewsContainer = document.getElementById('content-reviews');
            if (currentProduct.reviews && currentProduct.reviews.length > 0) {
                document.getElementById('tab-reviews').textContent = `Reviews (${currentProduct.reviews.length})`;
                currentProduct.reviews.forEach(review => {
                    const div = document.createElement('div');
                    div.className = "border-b border-slate-100 last:border-0 pb-6 last:pb-0";
                    div.innerHTML = `
                        <div class="flex items-center justify-between mb-2">
                            <div class="font-bold text-slate-900">${review.user}</div>
                            <div class="text-xs text-slate-400">${review.date}</div>
                        </div>
                        <div class="flex text-yellow-400 mb-2">
                            ${[...Array(5)].map((_, i) => `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 ${i < review.rating ? 'fill-current' : 'text-slate-200'}" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`).join('')}
                        </div>
                        <p class="text-slate-600">${review.comment}</p>
                    `;
                    reviewsContainer.appendChild(div);
                });
            } else {
                reviewsContainer.innerHTML = `<p class="text-slate-500 italic">No reviews yet. Be the first to review!</p>`;
            }

            // FAQ
            const faqContainer = document.getElementById('content-faq');
            if (currentProduct.faqs && currentProduct.faqs.length > 0) {
                currentProduct.faqs.forEach(faq => {
                    const div = document.createElement('div');
                    div.className = "bg-slate-50 rounded-lg p-4";
                    div.innerHTML = `
                        <h4 class="font-bold text-slate-900 mb-2 flex items-start gap-2">
                            <span class="text-blue-600">Q:</span> ${faq.question}
                        </h4>
                        <p class="text-slate-600 pl-6 text-sm">${faq.answer}</p>
                    `;
                    faqContainer.appendChild(div);
                });
            } else {
                faqContainer.innerHTML = `<p class="text-slate-500 italic">No FAQs available for this product.</p>`;
            }

            // Sidebar
            document.getElementById('sidebar-title').textContent = content.productPage.sidebarTitle;
            const sidebarList = document.getElementById('sidebar-points');
            content.productPage.sidebarPoints.forEach(point => {
                const li = document.createElement('li');
                li.className = "flex items-center gap-3";
                li.innerHTML = `
                    <div class="bg-white/20 p-2 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <span class="font-medium">${point.text}</span>
                `;
                sidebarList.appendChild(li);
            });

            // Related Products
            const related = content.caseStudies.studies
                .filter(p => p.category === currentProduct.category && p.id !== currentProduct.id)
                .slice(0, 3);
            
            if (related.length > 0) {
                document.getElementById('related-products-container').classList.remove('hidden');
                const relatedGrid = document.getElementById('related-products-grid');
                related.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "bg-white rounded-2xl border border-slate-100 overflow-hidden hover:shadow-lg transition-shadow group";
                    div.innerHTML = `
                        <div class="h-48 overflow-hidden relative">
                            <img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                            <span class="absolute top-4 left-4 bg-white/90 px-2 py-1 rounded text-xs font-bold text-blue-600">${item.category}</span>
                        </div>
                        <div class="p-6">
                            <h3 class="font-bold text-lg mb-2 text-slate-900 group-hover:text-blue-600 transition-colors">${item.title}</h3>
                            <div class="flex items-center justify-between mt-4">
                                <span class="text-sm text-slate-500">${item.client}</span>
                                <a href="${getProductLink(item)}" class="text-blue-600 font-bold text-sm flex items-center gap-1 hover:gap-2 transition-all">
                                    View <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
                                </a>
                            </div>
                        </div>
                    `;
                    relatedGrid.appendChild(div);
                });
            }
        }

        function updateGallery() {
            if (galleryImages.length === 0) return;
            
            document.getElementById('main-image').src = galleryImages[currentImageIdx];
            
            // Buttons
            if (galleryImages.length > 1) {
                document.getElementById('prev-btn').classList.remove('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
            }

            // Dots
            const dotsContainer = document.getElementById('gallery-dots');
            dotsContainer.innerHTML = '';
            if (galleryImages.length > 1) {
                galleryImages.forEach((_, idx) => {
                    const btn = document.createElement('button');
                    btn.className = `w-2.5 h-2.5 rounded-full transition-all ${idx === currentImageIdx ? 'bg-white w-6' : 'bg-white/40 hover:bg-white/60'}`;
                    btn.onclick = () => {
                        currentImageIdx = idx;
                        updateGallery();
                    };
                    dotsContainer.appendChild(btn);
                });
            }
        }

        function nextImage() {
            currentImageIdx = (currentImageIdx + 1) % galleryImages.length;
            updateGallery();
        }

        function prevImage() {
            currentImageIdx = (currentImageIdx - 1 + galleryImages.length) % galleryImages.length;
            updateGallery();
        }

        function switchTab(tabName) {
            // Reset buttons
            ['details', 'reviews', 'faq'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                btn.className = "flex-1 py-4 font-bold text-sm uppercase tracking-wider text-slate-500 hover:bg-slate-50";
                document.getElementById(`content-${t}`).classList.add('hidden');
            });

            // Activate current
            const activeBtn = document.getElementById(`tab-${tabName}`);
            activeBtn.className = "flex-1 py-4 font-bold text-sm uppercase tracking-wider bg-blue-50 text-blue-600 border-b-2 border-blue-600";
            document.getElementById(`content-${tabName}`).classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', renderPage);
        window.addEventListener('contentUpdated', renderPage);
    </script>
</body>
</html>
